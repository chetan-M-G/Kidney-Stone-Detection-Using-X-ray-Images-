<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-ray Stone Detection</title>
    <style>
        
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        /* Container Styling */
        .container {
            background-color: darkgray;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 600px;
        }

        /* Heading Styling */
        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        /* Form Styling */
        #upload-form {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* File Input Styling */
        input[type="file"] {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        /* Submit Button Styling */
        button {
            background-color: salmon;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Result Styling */
        #result {
            margin-top: 50px;
            font-size: 22px;
            color: #555;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1><b><i><u>Kidney Stone Detection</u></i></b></h1>
        <form action="/predict" method="post" enctype="multipart/form-data" id="upload-form">
            <label for="file"><b>Upload X-ray image:</b></label>
            <input type="file" name="file" id="file" required>
            <button type="submit">Submit</button>
        </form>
        <div id="result"></div>
    </div>
</body>
</html>
